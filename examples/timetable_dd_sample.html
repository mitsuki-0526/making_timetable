<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時間割ドラッグ＆ドロップ プロトタイプ (Step 1)</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --border-color: #cbd5e1;
            --primary-color: #6366f1;
            --header-bg: #f1f5f9;
            --cell-w: 120px;
            --cell-h: 80px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        h1 { color: #1e293b; margin-bottom: 20px; }
        p { color: #64748b; margin-bottom: 30px; }

        .timetable {
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        th, td {
            border: 1px solid var(--border-color);
            width: var(--cell-w);
            height: var(--cell-h);
            text-align: center;
            vertical-align: middle;
            padding: 0;
            position: relative;
        }

        th {
            background-color: var(--header-bg);
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
        }

        .period-header { font-size: 0.8rem; background: var(--header-bg); }

        /* 教科チップのスタイル */
        .subject-chip {
            width: 90%;
            height: 80%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: grab;
            font-weight: bold;
            font-size: 0.95rem;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
        }

        .subject-chip:active { cursor: grabbing; }
        .subject-chip:hover { transform: scale(1.02); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* 教科別の色 */
        .kokugo { background-color: #ef4444; } /* 赤 */
        .suugaku { background-color: #3b82f6; } /* 青 */
        .eigo { background-color: #10b981; }   /* 緑 */
        .rika { background-color: #f59e0b; }   /* オレンジ */

        /* ドラッグ中の視覚効果 */
        .dragging { opacity: 0.5; transform: scale(0.95); }
        .drag-over { background-color: #e0f2fe; border: 2px dashed var(--primary-color) !important; }

        .empty-cell { color: #cbd5e1; font-size: 0.8rem; font-weight: normal; }

        .controls { margin-top: 30px; }
        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h1>時間割 D&D プロトタイプ</h1>
    <p>教科（国語・数学など）をドラッグして他のマスに移動、または入れ替えができます。</p>

    <table class="timetable" id="timetable">
        <thead>
            <tr>
                <th class="period-header">時限 \ 曜日</th>
                <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th>
            </tr>
        </thead>
        <tbody>
            <!-- 1〜6限の行を生成 -->
            <script>
                const days = ['mon', 'tue', 'wed', 'thu', 'fri'];
                const subjects = [
                    { name: '国語', class: 'kokugo' },
                    { name: '数学', class: 'suugaku' },
                    { name: '英語', class: 'eigo' },
                    { name: '理科', class: 'rika' }
                ];

                for (let p = 1; p <= 6; p++) {
                    document.write('<tr>');
                    document.write(`<td class="period-header">${p}</td>`);
                    for (let d = 0; d < 5; d++) {
                        const cellId = `cell-${days[d]}-${p}`;
                        // 1限目だけ初期データを配置してみる
                        let content = '<span class="empty-cell">未設定</span>';
                        if (p === 1 && d < 4) {
                            const s = subjects[d];
                            content = `<div class="subject-chip ${s.class}" draggable="true" id="chip-${cellId}">${s.name}</div>`;
                        }
                        document.write(`<td id="${cellId}" ondragover="allowDrop(event)" ondrop="drop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">${content}</td>`);
                    }
                    document.write('</tr>');
                }
            </script>
        </tbody>
    </table>

    <div class="controls">
        <button class="btn" onclick="location.reload()">初期化</button>
    </div>

    <script>
        let draggedElement = null;

        document.addEventListener('dragstart', (e) => {
            if (e.target.classList.contains('subject-chip')) {
                draggedElement = e.target;
                e.target.classList.add('dragging');
                // Firefox対策
                e.dataTransfer.setData('text/plain', e.target.id);
            }
        });

        document.addEventListener('dragend', (e) => {
            if (e.target.classList.contains('subject-chip')) {
                e.target.classList.remove('dragging');
            }
        });

        function allowDrop(e) {
            e.preventDefault();
        }

        function dragEnter(e) {
            e.preventDefault();
            // td自体またはtd内の子要素にホバーした時
            const targetCell = e.target.closest('td');
            if (targetCell && targetCell.id.startsWith('cell-')) {
                targetCell.classList.add('drag-over');
            }
        }

        function dragLeave(e) {
            const targetCell = e.target.closest('td');
            if (targetCell) {
                targetCell.classList.remove('drag-over');
            }
        }

        function drop(e) {
            e.preventDefault();
            const targetCell = e.target.closest('td');
            if (!targetCell || !draggedElement) return;

            targetCell.classList.remove('drag-over');

            const sourceCell = draggedElement.parentNode;
            const targetContent = targetCell.querySelector('.subject-chip');

            if (targetContent) {
                // 【入れ替え (Swap) ロジック】
                // 移動先にあるチップを、移動元のセルに引っ越させる
                sourceCell.appendChild(targetContent);
                targetCell.appendChild(draggedElement);
            } else {
                // 【通常移動】
                // 移動先が空なら、移動元に「未設定」テキストを戻し、チップを移動
                sourceCell.innerHTML = '<span class="empty-cell">未設定</span>';
                targetCell.innerHTML = '';
                targetCell.appendChild(draggedElement);
            }
            
            draggedElement = null;
        }
    </script>
</body>
</html>
